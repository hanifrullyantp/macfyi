# Upload an existing DMG artifact to Supabase (skip Tauri build).
# Use when build succeeded locally or a prior workflow artifact exists.
name: Upload DMG only (Supabase)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  upload-only:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find latest macfyi-dmg artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ART_JSON="$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=macfyi-dmg")"
          ART_ID="$(echo "$ART_JSON" | node -e '
            const j=JSON.parse(require("fs").readFileSync(0,"utf8"));
            const row=(j.artifacts||[]).find(a=>a.name==="macfyi-dmg" && !a.expired);
            if(!row){process.exit(1)}
            process.stdout.write(String(row.id));
          ')"
          echo "artifact_id=$ART_ID" >> "$GITHUB_OUTPUT"
          echo "Using artifact id=$ART_ID"

      - name: Download DMG artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts/${{ steps.artifact.outputs.artifact_id }}/zip" > /tmp/macfyi-dmg.zip
          mkdir -p artifact-dmg
          unzip -o /tmp/macfyi-dmg.zip -d artifact-dmg
          ls -la artifact-dmg/

      - name: Place DMG into bundle path
        run: |
          mkdir -p src-tauri/target/release/bundle/dmg
          if compgen -G "artifact-dmg/*.dmg" > /dev/null; then
            cp artifact-dmg/*.dmg src-tauri/target/release/bundle/dmg/
            echo "Using artifact DMG"
          elif compgen -G "src-tauri/target/release/bundle/dmg/*.dmg" > /dev/null; then
            echo "Using repo-local DMG"
          else
            echo "No DMG found. Upload macfyi-dmg artifact first or commit a built .dmg." >&2
            exit 1
          fi
          ls -la src-tauri/target/release/bundle/dmg/

      - name: Verify Supabase secrets
        id: supabase_env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SKIP_RELEASE_STATE_CHECK: "1"
        run: bash scripts/verify-supabase-upload-env.sh

      - name: Resolve release version
        id: release_version
        run: |
          RAW="$(node -e 'const c=require("./src-tauri/tauri.conf.json");process.stdout.write(c.version||"0.2.0")')"
          echo "value=$RAW" >> "$GITHUB_OUTPUT"

      - name: Upload to Supabase
        env:
          SUPABASE_URL: ${{ steps.supabase_env.outputs.normalized_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          RELEASE_PLATFORM: macos-arm64
          SKIP_RELEASE_STATE_ROW: "1"
        run: bash scripts/upload-latest-dmg-to-supabase.sh
