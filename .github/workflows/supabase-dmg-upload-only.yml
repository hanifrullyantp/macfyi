# Upload an existing DMG artifact to Supabase (skip Tauri build).
name: Upload DMG only (Supabase)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "macos-arm64 or macos-intel"
        required: true
        default: macos-arm64
        type: choice
        options:
          - macos-arm64
          - macos-intel

permissions:
  actions: read
  contents: read

jobs:
  upload-only:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve artifact name
        id: meta
        run: |
          case "${{ inputs.platform }}" in
            macos-intel)
              echo "artifact_name=macfyi-dmg-intel" >> "$GITHUB_OUTPUT"
              echo "tauri_target=x86_64-apple-darwin" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "artifact_name=macfyi-dmg-arm64" >> "$GITHUB_OUTPUT"
              echo "tauri_target=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Find latest DMG artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="${{ steps.meta.outputs.artifact_name }}"
          ART_JSON="$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100")"
          ART_ID="$(echo "$ART_JSON" | node -e '
            const name=process.argv[1];
            const j=JSON.parse(require("fs").readFileSync(0,"utf8"));
            const rows=(j.artifacts||[]).filter(a=>!a.expired && (a.name===name || (name==="macfyi-dmg-arm64" && a.name==="macfyi-dmg")));
            if(!rows.length) process.exit(1);
            rows.sort((a,b)=>Date.parse(b.created_at)-Date.parse(a.created_at));
            process.stdout.write(String(rows[0].id));
          ' "$NAME")"
          echo "artifact_id=$ART_ID" >> "$GITHUB_OUTPUT"

      - name: Download DMG artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts/${{ steps.artifact.outputs.artifact_id }}/zip" > /tmp/macfyi-dmg.zip
          mkdir -p artifact-dmg
          unzip -o /tmp/macfyi-dmg.zip -d artifact-dmg
          ls -la artifact-dmg/

      - name: Place DMG into bundle path
        env:
          TAURI_TARGET: ${{ steps.meta.outputs.tauri_target }}
        run: |
          if [[ -n "${TAURI_TARGET}" ]]; then
            mkdir -p "src-tauri/target/${TAURI_TARGET}/release/bundle/dmg"
            cp artifact-dmg/*.dmg "src-tauri/target/${TAURI_TARGET}/release/bundle/dmg/"
          else
            mkdir -p src-tauri/target/release/bundle/dmg
            cp artifact-dmg/*.dmg src-tauri/target/release/bundle/dmg/
          fi

      - name: Verify Supabase secrets
        id: supabase_env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SKIP_RELEASE_STATE_CHECK: "1"
        run: bash scripts/verify-supabase-upload-env.sh

      - name: Resolve release version
        id: release_version
        run: |
          RAW="$(node -e 'const c=require("./src-tauri/tauri.conf.json");process.stdout.write(c.version||"0.2.0")')"
          echo "value=$RAW" >> "$GITHUB_OUTPUT"

      - name: Upload to Supabase
        env:
          SUPABASE_URL: ${{ steps.supabase_env.outputs.normalized_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          RELEASE_PLATFORM: ${{ inputs.platform }}
          TAURI_TARGET: ${{ steps.meta.outputs.tauri_target }}
          SKIP_RELEASE_STATE_ROW: "1"
        run: bash scripts/upload-latest-dmg-to-supabase.sh
