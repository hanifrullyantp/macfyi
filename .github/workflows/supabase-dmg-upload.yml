# Build macOS DMG (Apple Silicon + Intel) and upload to staging.
name: Upload DMG to Supabase

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_platform: macos-arm64
            tauri_target: ""
            artifact_name: macfyi-dmg-arm64
          - release_platform: macos-intel
            tauri_target: x86_64-apple-darwin
            artifact_name: macfyi-dmg-intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target (Intel)
        if: matrix.tauri_target != ''
        run: rustup target add ${{ matrix.tauri_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build DMG (Tauri + icons + sign)
        env:
          SKIP_MACOS_SIGN: "1"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: |
          export APPLE_SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY:--}"
          bash scripts/generate-tauri-icons.sh
          if [[ -n "${TAURI_TARGET}" ]]; then
            npx tauri build --target "${TAURI_TARGET}" --bundles app dmg
          else
            npx tauri build --bundles app dmg
          fi
          if [[ "${APPLE_SIGNING_IDENTITY}" != "-" ]]; then
            bash scripts/sign-macos-release.sh
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Resolve release version
        id: release_version
        run: |
          RAW="${GITHUB_REF_NAME}"
          if [[ "$RAW" == v* ]]; then
            RAW="${RAW#v}"
          fi
          if [[ -z "$RAW" || "$RAW" == "main" || "$RAW" == "master" ]]; then
            RAW="$(node -e 'const fs=require("fs");const cfg=JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json","utf8"));process.stdout.write(String(cfg.version||"0.0.0"))')"
          fi
          echo "value=$RAW" >> "$GITHUB_OUTPUT"

      - name: Verify Supabase secrets (normalize URL)
        id: supabase_env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bash scripts/verify-supabase-upload-env.sh

      - name: Upload DMG to Supabase Storage
        env:
          SUPABASE_URL: ${{ steps.supabase_env.outputs.normalized_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          RELEASE_PLATFORM: ${{ matrix.release_platform }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: bash scripts/upload-latest-dmg-to-supabase.sh

      - name: Upload bundle artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macfyi-bundle-on-failure-${{ matrix.release_platform }}
          path: src-tauri/target/**/bundle/
