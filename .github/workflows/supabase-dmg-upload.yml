# Build macOS DMG and upload to staging object only.
# Set GitHub secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Optional: set UPDATE_APP_SETTINGS secret to "true" to PATCH download_base_url after upload (or edit workflow env below).

name: Upload DMG to Supabase

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build DMG (Tauri + icons + sign)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run tauri:build:dmg

      - name: Resolve release version
        id: release_version
        run: |
          RAW="${GITHUB_REF_NAME}"
          if [[ "$RAW" == v* ]]; then
            RAW="${RAW#v}"
          fi
          if [[ -z "$RAW" || "$RAW" == "main" || "$RAW" == "master" ]]; then
            RAW="$(node -e 'const fs=require("fs");const cfg=JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json","utf8"));process.stdout.write(String(cfg.version||"0.0.0"))')"
          fi
          echo "value=$RAW" >> "$GITHUB_OUTPUT"

      - name: Upload DMG to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          RELEASE_PLATFORM: macos-arm64
        run: bash scripts/upload-latest-dmg-to-supabase.sh

      - name: Upload bundle artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macfyi-bundle-on-failure
          path: src-tauri/target/release/bundle/
