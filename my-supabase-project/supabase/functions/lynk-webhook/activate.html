<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>Aktifkan Akun Monefyi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 0;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #020617;
        border-radius: 16px;
        padding: 24px 20px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 4px;
      }
      p {
        font-size: 13px;
        margin: 0 0 8px;
        color: #9ca3af;
      }
      label {
        font-size: 13px;
        display: block;
        margin-bottom: 4px;
        color: #e5e7eb;
      }
      input {
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 13px;
        box-sizing: border-box;
        margin-bottom: 8px;
      }
      input:focus {
        outline: none;
        border-color: #22c55e;
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.4);
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 999px;
        border: none;
        background: #22c55e;
        color: #022c22;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        margin-top: 4px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .small {
        font-size: 12px;
      }
      .error {
        color: #f97373;
        font-size: 12px;
        margin-top: 4px;
      }
      .success {
        color: #4ade80;
        font-size: 12px;
        margin-top: 4px;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.12);
        color: #bbf7d0;
        margin-bottom: 8px;
      }
      .loading {
        font-size: 12px;
        color: #e5e7eb;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="loading-state" class="loading">
        Menghubungkan ke Monefyi, mohon tunggu sebentar...
      </div>

      <div id="form-container" style="display:none;">
        <span class="badge">Aktivasi akun</span>
        <h1>Buat kata sandi Monefyi</h1>
        <p>
          Masukkan email yang kamu gunakan saat melakukan pemesanan, lalu buat
          kata sandi baru untuk akun Monefyi kamu.
        </p>

        <form id="cp-form">
          <label for="cp-email">Email</label>
          <input
            id="cp-email"
            type="email"
            autocomplete="email"
            required
            placeholder="nama@email.com"
          />

          <label for="cp-password">Kata sandi baru</label>
          <input
            id="cp-password"
            type="password"
            autocomplete="new-password"
            required
            placeholder="Minimal 8 karakter"
          />

          <label for="cp-password2">Ulangi kata sandi baru</label>
          <input
            id="cp-password2"
            type="password"
            autocomplete="new-password"
            required
            placeholder="Ulangi kata sandi"
          />

          <button id="cp-submit" type="submit">Buat kata sandi</button>
        </form>

        <div id="cp-error" class="error"></div>
        <div id="cp-success" class="success"></div>

        <p class="small" style="margin-top:12px;">
          Setelah kata sandi berhasil dibuat, kamu bisa login melalui:
          <br />
        <a href="https://app.monefyi.com" style="color:#22c55e;text-decoration:none;">
  https://app.monefyi.com
</a>
          >
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (async function () {
        const SUPABASE_URL = "https://zzwqfmdyncxbolestkqp.supabase.co";
        const SUPABASE_ANON_KEY =
       "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6d3FmbWR5bmN4Ym9sZXN0a3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzNDI3OTQsImV4cCI6MjA4MTkxODc5NH0.qtvqzDicRmIixFh3A46ExuitpAXDWaYHmB7NVBxsc7w";


        const supabase = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_ANON_KEY
        );

        const loadingEl = document.getElementById("loading-state");
        const formContainer = document.getElementById("form-container");
        const form = document.getElementById("cp-form");
        const emailInput = document.getElementById("cp-email");
        const passInput = document.getElementById("cp-password");
        const pass2Input = document.getElementById("cp-password2");
        const submitBtn = document.getElementById("cp-submit");
        const errorEl = document.getElementById("cp-error");
        const successEl = document.getElementById("cp-success");

        function setLoading(message) {
          if (message) {
            loadingEl.textContent = message;
            loadingEl.style.display = "block";
          } else {
            loadingEl.style.display = "none";
          }
        }

        function showForm() {
          formContainer.style.display = "block";
        }

        function showError(msg) {
          errorEl.textContent = msg || "";
          successEl.textContent = "";
        }

        function showSuccess(msg) {
          successEl.textContent = msg || "";
          errorEl.textContent = "";
        }

        function getHashParams() {
          const hash = window.location.hash.substring(1);
          const params = {};
          hash.split("&").forEach((part) => {
            if (!part) return;
            const [key, value] = part.split("=");
            params[decodeURIComponent(key)] = decodeURIComponent(value || "");
          });
          return params;
        }

        async function initSessionFromHash() {
          const params = getHashParams();
          const accessToken = params["access_token"];
          const refreshToken = params["refresh_token"];

          if (!accessToken || !refreshToken) {
            setLoading(
              "Link undangan tidak valid atau sudah digunakan. Silakan buka kembali link terbaru dari email."
            );
            return false;
          }

          const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
          });

          if (error) {
            console.error("setSession error:", error);
            setLoading(
              "Tidak dapat mengaktifkan sesi dari link. Silakan ulangi dari email undangan."
            );
            return false;
          }

          // Bersihkan hash dari URL
          window.history.replaceState(
            {},
            document.title,
            window.location.pathname + window.location.search
          );

          return true;
        }

        setLoading("Menghubungkan ke Monefyi, mohon tunggu sebentar...");

        const ok = await initSessionFromHash();
        if (!ok) return;

        setLoading(null);
        showForm();

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          showError("");
          showSuccess("");

          const email = (emailInput.value || "").trim().toLowerCase();
          const pass = passInput.value || "";
          const pass2 = pass2Input.value || "";

          if (!email) {
            showError("Email wajib diisi.");
            return;
          }
          if (pass.length < 8) {
            showError("Kata sandi minimal 8 karakter.");
            return;
          }
          if (pass !== pass2) {
            showError("Konfirmasi kata sandi tidak sama.");
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Memproses...";

          try {
            // 1) Cek email di tabel orders
            const { data: orderRow, error: orderError } = await supabase
              .from("orders")
              .select("id")
              .eq("email", email)
              .limit(1)
              .maybeSingle();

            if (orderError) {
              console.error("Order check error:", orderError);
              showError("Terjadi kesalahan saat memeriksa data order.");
              return;
            }

            if (!orderRow) {
              showError(
                "Email anda belum terdaftar sebagai pengguna Monefyi."
              );
              return;
            }

            // 2) Cek user dari session
            const {
              data: { user },
              error: userError,
            } = await supabase.auth.getUser();

            if (userError || !user) {
              console.error("getUser error:", userError);
              showError(
                "Sesi tidak valid. Silakan buka kembali link dari email undangan."
              );
              return;
            }

            if ((user.email || "").toLowerCase() !== email.toLowerCase()) {
              showError(
                "Email yang dimasukkan tidak sesuai dengan email yang menerima undangan."
              );
              return;
            }

            // 3) Update password
            const { error: updateError } = await supabase.auth.updateUser({
              password: pass,
            });

            if (updateError) {
              console.error("updateUser error:", updateError);
              showError(
                "Gagal mengatur kata sandi. Silakan coba lagi beberapa saat lagi."
              );
              return;
            }

            showSuccess(
              "Kata sandi berhasil dibuat. Anda bisa login sekarang menggunakan email dan kata sandi tersebut."
            );
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Buat kata sandi";
          }
        });
      })();
    </script>
  </body>
</html>
